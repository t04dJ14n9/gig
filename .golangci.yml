version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly
  tests: false

linters:
  default: none
  enable:
    - cyclop
    - errcheck
    - funlen
    - gocyclo
    - govet
    - ineffassign
    - lll
    - maintidx
    - misspell
    - staticcheck
    - whitespace
  settings:
    cyclop:
      max-complexity: 60
      package-average: 0
    errcheck:
      check-blank: false
      check-type-assertions: false
    funlen:
      lines: 180
      statements: 140
      ignore-comments: true
    gocyclo:
      min-complexity: 60
    govet:
      disable:
        - inline
    lll:
      line-length: 320
      tab-width: 1
    maintidx:
      under: 10
    misspell:
      mode: restricted
  exclusions:
    rules:
      - path: '(^|/)testdata/|(^|/)packages/|(^|/)mydep/packages/'
        linters:
          - cyclop
          - errcheck
          - funlen
          - gocyclo
          - govet
          - ineffassign
          - lll
          - maintidx
          - misspell
          - staticcheck
          - whitespace
      - path: '_test\.go$'
        linters:
          - cyclop
          - funlen
          - gocyclo
          - lll
          - maintidx

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    paths:
      - '(^|/)testdata/'
      - '(^|/)packages/'
      - '(^|/)mydep/packages/'

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

output:
  sort-order:
    - linter
    - severity
    - file
  show-stats: false

severity:
  default: error
