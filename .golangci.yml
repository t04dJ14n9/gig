version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly
  tests: false

linters:
  default: none
  enable:
    - cyclop
    - errcheck
    - funlen
    - gocyclo
    - govet
    - ineffassign
    - lll
    - maintidx
    - misspell
    - staticcheck
    - whitespace
  settings:
    cyclop:
      max-complexity: 18
      package-average: 0
    errcheck:
      check-blank: false
      check-type-assertions: false
    funlen:
      lines: 140
      statements: 80
      ignore-comments: true
    gocyclo:
      min-complexity: 20
    govet:
      disable:
        - inline
    lll:
      line-length: 160
      tab-width: 1
    maintidx:
      under: 20
    misspell:
      mode: restricted
  exclusions:
    rules:
      - path: '(^|/)testdata/|(^|/)packages/|(^|/)mydep/packages/'
        linters:
          - cyclop
          - errcheck
          - funlen
          - gocyclo
          - govet
          - ineffassign
          - lll
          - maintidx
          - misspell
          - staticcheck
          - whitespace
      - path: '_test\.go$'
        linters:
          - cyclop
          - funlen
          - gocyclo
          - lll
          - maintidx
      - path: '^(compiler/compile_builtin\.go|compiler/external_func_origin\.go|compiler/optimize/int_specialize\.go|compiler/optimize/slice_fusion\.go|compiler/typecheck\.go|importer/typeconv\.go|model/value/extern_errors_as\.go|model/value/reflect\.go|vm/ops_make_interface\.go|vm/reference\.go|vm/typeconv\.go|vm/vm\.go)$'
        linters:
          - cyclop
      - path: '^(compiler/compile_builtin\.go|compiler/external_func_origin\.go|compiler/optimize/int_specialize\.go|compiler/optimize/slice_fusion\.go|compiler/typecheck\.go|importer/typeconv\.go|model/value/extern_errors_as\.go|model/value/reflect\.go|vm/ops_make_interface\.go|vm/vm\.go)$'
        linters:
          - gocyclo
      - path: '^importer/typeconv\.go$'
        linters:
          - funlen

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    paths:
      - '(^|/)testdata/'
      - '(^|/)packages/'
      - '(^|/)mydep/packages/'

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

output:
  sort-order:
    - linter
    - severity
    - file
  show-stats: false

severity:
  default: error
